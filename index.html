<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High CGI Magic Orb</title>
    
    <!-- MediaPipe for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Import Maps for Modern Three.js & Post-Processing -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #020202; font-family: 'Courier New', Courier, monospace; }

        /* Mirrored Webcam Feed */
        .input_video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); opacity: 0.4; z-index: 1;
            filter: contrast(1.3) saturate(0.8);
        }

        /* 3D Canvas */
        #cgi-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3; pointer-events: none;
        }

        /* Cinematic Dark Edge Vignette */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 40%, #000 110%);
            z-index: 2; pointer-events: none;
        }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff00aa; text-align: center; font-size: 14px; letter-spacing: 4px;
            text-transform: uppercase; z-index: 20; text-shadow: 0 0 10px #ff00aa;
        }
    </style>
</head>
<body>

    <div id="loading">INITIALIZING NEURAL NET<br><span style="font-size:10px; opacity:0.6">ALLOW CAMERA ACCESS</span></div>

    <video class="input_video" autoplay playsinline></video>
    <div id="vignette"></div>
    <div id="cgi-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. SETUP HIGH-END 3D SCENE ---
        const container = document.getElementById('cgi-container');
        const scene = new THREE.Scene();
        
        // Orthographic camera makes 2D screen to 3D mapping perfect
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- 2. CINEMATIC POST-PROCESSING (THE CGI SECRET) ---
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        // UnrealBloomPass creates the massive glowing magic effect
        // Parameters: Resolution, Strength, Radius, Threshold
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.8, 0.1);
        composer.addPass(bloomPass);

        // --- 3. BUILD THE MARVEL ORB ---
        const orbGroup = new THREE.Group();
        scene.add(orbGroup);
        orbGroup.scale.set(0, 0, 0); // Start hidden

        const COLOR_PRIMARY = 0xff00aa; // Neon Pink
        const COLOR_CORE = 0xffffff;    // White
        const COLOR_SECONDARY = 0xaa00ff; // Purple

        // 3.1 The Bright Core
        const coreGeo = new THREE.SphereGeometry(0.15, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: COLOR_CORE });
        const core = new THREE.Mesh(coreGeo, coreMat);
        orbGroup.add(core);

        // 3.2 The Holographic Wireframe Globe
        const globeGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const globeMat = new THREE.MeshBasicMaterial({ 
            color: COLOR_SECONDARY, wireframe: true, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending 
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        orbGroup.add(globe);

        // 3.3 Intricate Dashed Rings
        const rings = [];
        for(let i = 0; i < 4; i++) {
            const ringGeo = new THREE.RingGeometry(0.5 + (i * 0.15), 0.52 + (i * 0.15), 64);
            const edgesGeo = new THREE.EdgesGeometry(ringGeo);
            
            const ringMat = new THREE.LineDashedMaterial({
                color: i % 2 === 0 ? COLOR_PRIMARY : COLOR_SECONDARY,
                linewidth: 1, scale: 1, dashSize: 0.05, gapSize: 0.05,
                transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
            });
            
            const ring = new THREE.LineSegments(edgesGeo, ringMat);
            ring.computeLineDistances(); // Required for dashed lines to work
            
            // Random initial rotations
            ring.rotation.x = Math.random() * Math.PI;
            ring.rotation.y = Math.random() * Math.PI;
            
            rings.push(ring);
            orbGroup.add(ring);
        }

        // 3.4 Dynamic Energy Tendrils (Lightning) connecting to hands
        const createTendril = () => {
            const points = [];
            for(let i=0; i<6; i++) points.push(new THREE.Vector3(0,0,0));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: COLOR_PRIMARY, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
            });
            return new THREE.Line(geometry, material);
        };
        const tendrilLeft = createTendril();
        const tendrilRight = createTendril();
        scene.add(tendrilLeft);
        scene.add(tendrilRight);


        // --- 4. AI HAND TRACKING LOGIC ---
        const videoElement = document.querySelector('.input_video');
        let targetOrbPos = new THREE.Vector3(0, 0, 0);
        let targetOrbScale = 0;
        let currentOrbScale = 0;
        let leftHandPos = new THREE.Vector3();
        let rightHandPos = new THREE.Vector3();
        let isMagicActive = false;

        function onResults(results) {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                isMagicActive = true;
                
                // Get palms (landmark 9) of both hands
                const palm1 = results.multiHandLandmarks[0][9];
                const palm2 = results.multiHandLandmarks[1][9];

                // Calculate midpoint
                const midX = (palm1.x + palm2.x) / 2;
                const midY = (palm1.y + palm2.y) / 2;

                // Map screen to 3D space (Flip X for mirror)
                const mappedMidX = -((midX * 2) - 1) * aspect; 
                const mappedMidY = -((midY * 2) - 1);
                targetOrbPos.set(mappedMidX, mappedMidY, 0);

                // Individual hand positions for lightning
                leftHandPos.set(-((palm1.x * 2) - 1) * aspect, -((palm1.y * 2) - 1), 0);
                rightHandPos.set(-((palm2.x * 2) - 1) * aspect, -((palm2.y * 2) - 1), 0);

                // Scale based on distance between hands
                const dist = Math.hypot(palm1.x - palm2.x, palm1.y - palm2.y);
                targetOrbScale = Math.max(0.5, dist * 4);
                
                tendrilLeft.visible = true;
                tendrilRight.visible = true;
            } else {
                // Shrink and hide if 2 hands aren't visible
                targetOrbScale = 0;
                isMagicActive = false;
                tendrilLeft.visible = false;
                tendrilRight.visible = false;
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        cameraFeed.start();


        // --- 5. ANIMATION & VFX LOOP ---
        const clock = new THREE.Clock();

        // Helper to animate lightning bolts
        function animateTendril(tendril, startVec, endVec) {
            const positions = tendril.geometry.attributes.position.array;
            for(let i=0; i<6; i++) {
                // Interpolate from orb center (startVec) to hand (endVec)
                const t = i / 5; 
                let x = startVec.x + (endVec.x - startVec.x) * t;
                let y = startVec.y + (endVec.y - startVec.y) * t;
                let z = startVec.z + (endVec.z - startVec.z) * t;

                // Add random jitter to middle points to look like electricity
                if (i > 0 && i < 5) {
                    x += (Math.random() - 0.5) * 0.3;
                    y += (Math.random() - 0.5) * 0.3;
                }

                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = z;
            }
            tendril.geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Smooth scaling (Lerp)
            currentOrbScale += (targetOrbScale - currentOrbScale) * 0.15;
            orbGroup.scale.set(currentOrbScale, currentOrbScale, currentOrbScale);

            if (currentOrbScale > 0.01) {
                // Smooth follow position
                orbGroup.position.lerp(targetOrbPos, 0.2);

                // Rotate components
                globe.rotation.y += 0.5 * delta;
                globe.rotation.x += 0.2 * delta;

                rings[0].rotation.x += 2 * delta;
                rings[1].rotation.y -= 2.5 * delta;
                rings[2].rotation.z += 1.5 * delta;
                rings[2].rotation.x += 1 * delta;
                rings[3].rotation.y += 3 * delta;
                rings[3].rotation.z -= 1 * delta;

                // Animate electricity tendrils pointing to hands
                if(isMagicActive && time % 0.05 < 0.02) { 
                    // Update lightning geometry rapidly, but not every single frame
                    animateTendril(tendrilLeft, orbGroup.position, leftHandPos);
                    animateTendril(tendrilRight, orbGroup.position, rightHandPos);
                }

                // Pulsate core
                const pulse = Math.sin(time * 8) * 0.1;
                core.scale.set(1 + pulse, 1 + pulse, 1 + pulse);
            }

            // Render via composer for Bloom Effect!
            composer.render();
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            const newAspect = window.innerWidth / window.innerHeight;
            camera.left = -newAspect; camera.right = newAspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
