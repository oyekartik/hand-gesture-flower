<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled 3D Flower</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
        }

        #webcam {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            transform: scaleX(-1);
            border-radius: 8px;
            border: 2px solid #555;
            z-index: 10;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }

        .val-container {
            margin-bottom: 8px;
        }

        .label {
            font-weight: bold;
            font-size: 14px;
        }

        .value {
            color: #00ffcc;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <div class="val-container">
            <span class="label">Left Hand (Bloom): </span>
            <span id="bloom-val" class="value">0.00</span>
        </div>
        <div class="val-container">
            <span class="label">Right Hand (Grow): </span>
            <span id="grow-val" class="value">0.00</span>
        </div>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xff007f, 2, 50);
        pointLight.position.set(0, 5, 2);
        scene.add(pointLight);

        const flowerGroup = new THREE.Group();
        scene.add(flowerGroup);

        const stemGeometry = new THREE.CylinderGeometry(0.1, 0.15, 1, 16);
        stemGeometry.translate(0, 0.5, 0); 
        const stemMaterial = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.8 });
        const stemMesh = new THREE.Mesh(stemGeometry, stemMaterial);
        flowerGroup.add(stemMesh);

        const petalsGroup = new THREE.Group();
        petalsGroup.position.y = 1;
        flowerGroup.add(petalsGroup);

        const centerGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xffa500, emissive: 0x332200 });
        const centerMesh = new THREE.Mesh(centerGeo, centerMat);
        petalsGroup.add(centerMesh);

        const petalCount = 6;
        const petalMeshes = [];
        const petalGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        petalGeometry.scale(1, 0.3, 1.8);
        const petalMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff007f, 
            roughness: 0.5,
            emissive: 0x220005 
        });

        for (let i = 0; i < petalCount; i++) {
            const angle = (i / petalCount) * Math.PI * 2;
            const petalPivot = new THREE.Group();
            
            const petalMesh = new THREE.Mesh(petalGeometry, petalMaterial);
            petalMesh.position.z = 0.5;
            petalMesh.rotation.x = 0.2;
            
            petalPivot.add(petalMesh);
            petalPivot.rotation.y = angle;
            
            petalsGroup.add(petalPivot);
            petalMeshes.push(petalPivot);
        }

        let growValue = 0.5;
        let bloomValue = 0.1;

        function updateFlower() {
            stemMesh.scale.y = 1 + (growValue * 4);
            petalsGroup.position.y = stemMesh.scale.y;
            petalsGroup.scale.setScalar(0.5 + bloomValue);
            
            petalMeshes.forEach((pivot) => {
                const petal = pivot.children[0];
                petal.rotation.x = 0.1 + (bloomValue * 0.8);
            });
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const videoElement = document.getElementById('webcam');
        const bloomDisplay = document.getElementById('bloom-val');
        const growDisplay = document.getElementById('grow-val');

        function getDistance(pt1, pt2) {
            return Math.sqrt(
                Math.pow(pt1.x - pt2.x, 2) +
                Math.pow(pt1.y - pt2.y, 2) +
                Math.pow(pt1.z - pt2.z, 2)
            );
        }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label;

                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const distance = getDistance(thumbTip, indexTip);

                    const normalizedVal = Math.min(Math.max((distance - 0.03) / 0.22, 0), 1);

                    if (handedness === 'Left') {
                        bloomValue = normalizedVal;
                        bloomDisplay.innerText = bloomValue.toFixed(2);
                    } else if (handedness === 'Right') {
                        growValue = normalizedVal;
                        growDisplay.innerText = growValue.toFixed(2);
                    }
                }
            }
            updateFlower();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        cameraUtils.start();

        function animate() {
            requestAnimationFrame(animate);
            flowerGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        
        updateFlower();
        animate();
    </script>
</body>
</html>
