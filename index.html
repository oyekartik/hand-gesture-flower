<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Tracking Flower</title>
    
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Load MediaPipe for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Mirrored webcam background */
        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            opacity: 0.8;
        }

        /* 3D Canvas */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        /* UI Overlays */
        #debug-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            color: #ff66b2;
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            font-family: monospace;
            font-size: 14px;
        }

        .finger-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            display: none; /* Hidden until hands are detected */
            transform: translate(-50%, -150%);
            border: 1px solid #ff66b2;
            white-space: nowrap;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">Allow Camera Access & Loading AI Models...</div>

    <!-- UI Elements -->
    <div id="debug-panel">
        <div>Bloom: <span id="bloom-val">0.00</span></div>
        <div>Grow: <span id="grow-val">0.00</span></div>
        <div>Noise: <span id="noise-val">3.15</span></div>
    </div>
    
    <div id="label-left" class="finger-label">🌸 Left Hand: Bloom</div>
    <div id="label-right" class="finger-label">🌱 Right Hand: Grow</div>

    <!-- Video & 3D Canvas -->
    <video class="input_video" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        // --- 1. SETUP THREE.JS (The 3D Flower) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Setup Camera & Renderer
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Add Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Create Procedural Flower
        const flowerGroup = new THREE.Group();
        flowerGroup.position.y = -2; // Start at bottom of screen
        scene.add(flowerGroup);

        // Stem
        const stemGeo = new THREE.CylinderGeometry(0.05, 0.08, 4);
        stemGeo.translate(0, 2, 0); // Move pivot to bottom
        const stemMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        // Petals Group (attached to top of stem)
        const petalsGroup = new THREE.Group();
        petalsGroup.position.y = 4;
        stem.add(petalsGroup);

        // Center of flower
        const centerGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const centerMat = new THREE.MeshPhongMaterial({ color: 0xffdd00 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        petalsGroup.add(center);

        // Create Petals
        const petalGeo = new THREE.SphereGeometry(0.4, 16, 16);
        petalGeo.scale(1, 0.2, 1.5); // Flatten sphere into petal shape
        const petalMat = new THREE.MeshPhongMaterial({ 
            color: 0xff1493, 
            transparent: true, 
            opacity: 0.8 
        });

        const numPetals = 6;
        for(let i=0; i<numPetals; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            const angle = (i / numPetals) * Math.PI * 2;
            petal.position.x = Math.cos(angle) * 0.4;
            petal.position.z = Math.sin(angle) * 0.4;
            petal.rotation.y = -angle;
            petal.rotation.x = 0.2; // Angle them slightly up
            petalsGroup.add(petal);
        }

        // --- 2. SETUP MEDIAPIPE (AI Hand Tracking) ---
        const videoElement = document.getElementsByClassName('input_video')[0];
        const labelLeft = document.getElementById('label-left');
        const labelRight = document.getElementById('label-right');
        const valBloom = document.getElementById('bloom-val');
        const valGrow = document.getElementById('grow-val');
        const loadingBox = document.getElementById('loading');

        // Target values for smooth animation
        let targetGrow = 0;
        let targetBloom = 0;
        let currentGrow = 0.1; // Start tiny
        let currentBloom = 0.1;

        function onResults(results) {
            // Hide loading screen once AI is running
            if(loadingBox.style.display !== 'none') {
                loadingBox.style.display = 'none';
            }

            labelLeft.style.display = 'none';
            labelRight.style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handType = results.multiHandedness[i].label; // "Left" or "Right"
                    
                    // Landmark 8 is the tip of the Index Finger
                    const indexFinger = landmarks[8];
                    
                    // Convert normalized coordinates to screen pixels for labels
                    const screenX = indexFinger.x * window.innerWidth;
                    const screenY = indexFinger.y * window.innerHeight;

                    // Calculate a value based on how high the finger is (0 at bottom, 1 at top)
                    // We clamp it so it doesn't go crazy
                    const heightValue = Math.max(0, Math.min(1, 1 - indexFinger.y));

                    if (handType === 'Right') {
                        // Right Hand controls Growth
                        labelRight.style.display = 'block';
                        labelRight.style.left = `${screenX}px`;
                        labelRight.style.top = `${screenY}px`;
                        targetGrow = heightValue;
                    } else {
                        // Left Hand controls Bloom
                        labelLeft.style.display = 'block';
                        labelLeft.style.left = `${screenX}px`;
                        labelLeft.style.top = `${screenY}px`;
                        targetBloom = heightValue;
                    }
                }
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            selfieMode: true // Matches the mirrored webcam CSS
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        cameraFeed.start();

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Smoothly interpolate current values towards target values (Lerp)
            currentGrow += (targetGrow - currentGrow) * 0.1;
            currentBloom += (targetBloom - currentBloom) * 0.1;

            // Update UI Debug Panel
            valGrow.innerText = currentGrow.toFixed(2);
            valBloom.innerText = currentBloom.toFixed(2);

            // Apply to 3D Flower:
            
            // 1. Grow stem (Y scale)
            const mappedScale = 0.2 + (currentGrow * 1.5); // Min scale 0.2, Max 1.7
            stem.scale.set(1, mappedScale, 1);
            
            // 2. Bloom petals (overall scale of petals group)
            const mappedBloom = 0.1 + (currentBloom * 1.5); // Min scale 0.1, Max 1.6
            petalsGroup.scale.set(mappedBloom, mappedBloom, mappedBloom);

            // Add gentle floating animation
            flowerGroup.rotation.y += 0.005;
            flowerGroup.position.x = Math.sin(Date.now() * 0.001) * 0.2;

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
