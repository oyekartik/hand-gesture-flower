<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel AI Superpowers</title>
    
    <!-- Three.js for High CGI Effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }

        /* Mirrored Webcam Feed */
        .input_video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); opacity: 0.5; z-index: 1;
            filter: contrast(1.2) saturate(1.2);
        }

        /* 2D Canvas for Neon Drawing */
        #drawing-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none; transform: scaleX(-1);
        }

        /* 3D Canvas for Marvel Superpower Orb */
        #cgi-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3; pointer-events: none;
        }

        /* Cinematic Vignette */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 50%, #000 120%);
            z-index: 4; pointer-events: none;
        }

        /* UI Overlay */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 255, 0.3); border-radius: 12px;
            color: #fff; padding: 15px 20px; text-transform: uppercase;
            letter-spacing: 2px; font-size: 12px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }

        .status { color: #ff00ff; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            z-index: 20; letter-spacing: 3px; border: 1px solid #ff00ff;
        }
    </style>
</head>
<body>

    <div id="loading">CALIBRATING MAGIC... (Allow Camera)</div>

    <div id="ui-panel">
        <div>System: <span class="status">Active</span></div>
        <div>Mode: <span id="mode-text" class="status">Waiting...</span></div>
        <div style="font-size: 9px; color: #888; margin-top: 5px;">1 Hand = Draw | 2 Hands = Superpower</div>
    </div>

    <!-- Layers -->
    <video class="input_video" autoplay playsinline></video>
    <canvas id="drawing-canvas"></canvas>
    <div id="cgi-container"></div>
    <div id="vignette"></div>

    <script>
        // --- 1. SETUP 2D DRAWING CANVAS (Neon Line) ---
        const drawCanvas = document.getElementById('drawing-canvas');
        const ctx = drawCanvas.getContext('2d');
        drawCanvas.width = window.innerWidth;
        drawCanvas.height = window.innerHeight;

        // Neon Glow Settings
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#ff00ff'; // Neon Pink/Purple
        ctx.strokeStyle = '#fff'; // White core of the laser
        
        let lastX = 0, lastY = 0;
        let isDrawing = false;


        // --- 2. SETUP THREE.JS (Marvel CGI Energy Orb) ---
        const cgiContainer = document.getElementById('cgi-container');
        const scene = new THREE.Scene();
        
        // Orthographic camera makes it easier to map screen coordinates to 3D space
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 100);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        cgiContainer.appendChild(renderer.domElement);

        // -- Build the Magic Orb --
        const orbGroup = new THREE.Group();
        scene.add(orbGroup);
        orbGroup.visible = false; // Hidden until 2 hands are detected

        // Core glowing sphere
        const coreGeo = new THREE.SphereGeometry(0.2, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0.9 
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        orbGroup.add(core);

        // Outer Aura (Additive Blending makes it look like light/fire)
        const auraGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({ 
            color: 0xff00aa, transparent: true, opacity: 0.5,
            blending: THREE.AdditiveBlending 
        });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        orbGroup.add(aura);

        // Magic Rings (Doctor Strange Style)
        const rings = [];
        for(let i=0; i<3; i++) {
            const ringGeo = new THREE.TorusGeometry(0.4 + (i*0.1), 0.01, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: 0xff00ff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending 
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.random() * Math.PI;
            ring.rotation.y = Math.random() * Math.PI;
            rings.push(ring);
            orbGroup.add(ring);
        }

        // Energy Particles
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 200;
        const posArray = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 1.5;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMat = new THREE.PointsMaterial({
            size: 0.02, color: 0xff88ff, transparent: true, blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        orbGroup.add(particles);


        // --- 3. MEDIAPIPE AI LOGIC ---
        const videoElement = document.querySelector('.input_video');
        const modeText = document.getElementById('mode-text');

        // Target variables for smooth Lerp animation
        let targetOrbPos = new THREE.Vector3(0, 0, 0);
        let targetOrbScale = 1;
        let currentOrbScale = 0;

        function onResults(results) {
            document.getElementById('loading').style.display = 'none';

            // Fade the drawing canvas very slowly (creates a trail effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                
                // --- MODE 1: DRAWING (1 Hand Detected) ---
                if (results.multiHandLandmarks.length === 1) {
                    modeText.innerText = "NEON DRAWING";
                    orbGroup.visible = false; // Hide CGI orb

                    const indexFinger = results.multiHandLandmarks[0][8];
                    
                    // Map AI coordinates to Canvas (Mirrored)
                    const x = indexFinger.x * drawCanvas.width;
                    const y = indexFinger.y * drawCanvas.height;

                    if (!isDrawing) {
                        lastX = x; lastY = y;
                        isDrawing = true;
                    }

                    // Calculate drawing speed to change line thickness
                    const speed = Math.hypot(x - lastX, y - lastY);
                    ctx.lineWidth = Math.max(3, 15 - (speed * 0.2)); 
                    ctx.shadowBlur = ctx.lineWidth * 2;

                    // Draw Line
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(x, y);
                    ctx.stroke();

                    lastX = x; lastY = y;
                } 
                
                // --- MODE 2: SUPERPOWER (2 Hands Detected) ---
                else if (results.multiHandLandmarks.length === 2) {
                    modeText.innerText = "CGI MAGIC ORB";
                    isDrawing = false; // Stop drawing

                    // Get palms (landmark 9) of both hands
                    const hand1 = results.multiHandLandmarks[0][9];
                    const hand2 = results.multiHandLandmarks[1][9];

                    // Calculate midpoint between hands
                    const midX = (hand1.x + hand2.x) / 2;
                    const midY = (hand1.y + hand2.y) / 2;

                    // Calculate distance between hands (for scale)
                    const dist = Math.hypot(hand1.x - hand2.x, hand1.y - hand2.y);

                    // Map AI screen coordinates to Three.js Orthographic space
                    // We flip the X axis because the camera is mirrored
                    const mappedX = -((midX * 2) - 1) * aspect; 
                    const mappedY = -((midY * 2) - 1);

                    targetOrbPos.set(mappedX, mappedY, 0);
                    
                    // Scale the orb based on how far apart hands are
                    targetOrbScale = Math.max(0.5, dist * 5); 
                    orbGroup.visible = true;
                }
            } else {
                // No hands detected
                isDrawing = false;
                orbGroup.visible = false;
                modeText.innerText = "SEARCHING...";
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        cameraFeed.start();


        // --- 4. CGI ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (orbGroup.visible) {
                // Smoothly Lerp position and scale so it doesn't jitter
                orbGroup.position.lerp(targetOrbPos, 0.15);
                currentOrbScale += (targetOrbScale - currentOrbScale) * 0.1;
                orbGroup.scale.set(currentOrbScale, currentOrbScale, currentOrbScale);

                // Rotate rings chaotically (Doctor Strange style)
                rings[0].rotation.x += 2 * delta;
                rings[1].rotation.y -= 3 * delta;
                rings[2].rotation.z += 1.5 * delta;
                rings[2].rotation.x += 1 * delta;

                // Pulsate core and aura
                const pulse = Math.sin(time * 5) * 0.1;
                core.scale.set(1 + pulse, 1 + pulse, 1 + pulse);
                aura.scale.set(1 - pulse, 1 - pulse, 1 - pulse);

                // Rotate particles
                particles.rotation.y += 0.5 * delta;
                particles.rotation.x += 0.2 * delta;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            drawCanvas.width = window.innerWidth;
            drawCanvas.height = window.innerHeight;
            
            const newAspect = window.innerWidth / window.innerHeight;
            camera.left = -newAspect;
            camera.right = newAspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
